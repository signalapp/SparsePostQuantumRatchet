name: Lean Verification
# This workflow builds and checks the Lean verification project.
# It ensures that all proofs compile and that the formal verification remains valid.

on:
  push:
    branches: [ '**' ]
    paths:
      - 'Spqr/**'
      - 'lakefile.toml'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'
  # since it is required for merging, it must run on each PR even if the files affected aren't in paths
  # see https://docs.github.com/en/enterprise-cloud@latest/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks#handling-skipped-but-required-checks
  pull_request: 
    branches: [ '**' ]
  workflow_dispatch:

env:
  LEAN_ABORT_ON_PANIC: 1

jobs:
  build:
    name: Build Lean Project
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          lint: false
          use-mathlib-cache: true

      - name: Restore base sorry manifest
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          key: sorry-manifest-${{ github.event.pull_request.base.ref }}-${{ github.event.pull_request.base.sha }}
          path: sorry-manifest.txt

      - name: Prepare base manifest
        if: github.event_name == 'pull_request'
        run: |
          [ -f sorry-manifest.txt ] && mv sorry-manifest.txt sorry-manifest-base.txt || true

      - name: Axiom audit and sorry manifest
        run: lake env lean scripts/Audit.lean

      - name: Save sorry manifest to cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          key: sorry-manifest-main-${{ github.sha }}
          path: sorry-manifest.txt

      - name: Upload sorry manifests
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sorry-manifests
          path: |
            sorry-manifest.txt
            sorry-manifest-base.txt
          if-no-files-found: ignore
          retention-days: 1

  report-sorry-delta:
    name: Report Sorry Delta
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    # Write permissions are isolated to this lightweight job.
    # For fork PRs the token is read-only; the action degrades gracefully.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/

      - name: Download sorry manifests
        uses: actions/download-artifact@v4
        with:
          name: sorry-manifests
          path: sorry-manifests

      - name: Compute sorry delta
        run: python3 scripts/sorry-diff.py sorry-manifests/sorry-manifest-base.txt sorry-manifests/sorry-manifest.txt

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: sorry-delta
          path: .sorry-delta-comment.md
