# Aeneas extraction configuration

aeneas:
  commit: "3fb1cd4b" # pinned commit hash
  repo: "https://github.com/AeneasVerif/aeneas.git"

# Upstream Rust crate we are verifying
upstream:
  repo: "https://github.com/signalapp/SparsePostQuantumRatchet"
  commit: "f2589fef855c10f39d72634dab3d14654dd410bf"

crate:
  dir: "." # path to Rust crate
  name: "spqr" # package name

charon:
  preset: "aeneas"
  hide_marker_traits: true
  cargo_args: ["--features", "extraction"]
  start_from_pub: true
  exclude:
    - "spqr::encoding::gf::check_accelerated" # cpufeatures macro: arrow types unsupported by Aeneas
    - "spqr::encoding::gf::accelerated" # platform-specific SIMD intrinsics
    - "log" # log crate internals cause Aeneas error
    - "spqr::proto::_::{impl core::fmt::Debug for _}"
    - "spqr::proto::_::_::{impl core::fmt::Debug for _}"
    - "spqr::proto::_::_::_::{impl core::fmt::Debug for _}"
    - "spqr::proto::_::{impl core::hash::Hash for _}"
    - "spqr::proto::_::_::{impl core::hash::Hash for _}"
    - "spqr::proto::_::_::_::{impl core::hash::Hash for _}"
    - "spqr::proto::_::_::{impl core::cmp::PartialEq for _}" # prost-generated, Aeneas type mismatch
    - "spqr::proto::_::_::_::{impl core::cmp::PartialEq for _}"
    - "spqr::proto::_::_::{impl core::cmp::Eq for _}"
    - "spqr::proto::_::_::_::{impl core::cmp::Eq for _}"
    - "spqr::proto::_::_::{impl core::marker::StructuralPartialEq for _}"
    - "spqr::proto::_::_::_::{impl core::marker::StructuralPartialEq for _}"
    - "spqr::{impl core::fmt::Debug for spqr::Error}" # Aeneas assertion failure
    - "spqr::{impl core::fmt::Display for spqr::Error}" # Aeneas assertion failure
    - "spqr::{impl core::fmt::Debug for spqr::CurrentVersion}" # Debug for Version (proto) is excluded, so this cascades
    - "spqr::{impl core::convert::From<spqr::serialize::Error> for spqr::Error}" # name clash
  opaque:
    # `hkdf_to_slice`: https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/104
    - "spqr::kdf::hkdf_to_slice"
    - "spqr::incremental_mlkem768::potentially_fix_state_incorrectly_encoded_by_libcrux_issue_1275" # has log calls; kept opaque so encaps2 can call it
    - "spqr::encoding::gf::mul2_u16" # dispatches to excluded accelerated code
    - "spqr::encoding::gf::{core::ops::arith::MulAssign<&spqr::encoding::gf::GF16> for spqr::encoding::gf::GF16}"
    # `decoded_message`: https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/103
    - "spqr::encoding::polynomial::{spqr::encoding::Decoder for spqr::encoding::polynomial::PolyDecoder}::decoded_message"
    - "spqr::proto::_::{impl prost::message::Message for _}"
    - "spqr::proto::_::_::{impl prost::message::Message for _}"
    - "spqr::proto::_::_::_::{impl prost::message::Message for _}"

aeneas_args:
  options:
    - split-files
  dest: "." # output directory (project root)
  subdir: "Spqr/Code" # sub-folder for files (sets import paths to Spqr.Code.*)

# Post-extraction find/replace applied to generated Lean files.
tweaks:
  files: ["Types.lean", "Funs.lean"]
  substitutions:
    # Normalize absolute build paths in Source comments so they are reproducible across machines
    - regex: "Source: '[^']*/target/[^']*/out/"
      replace: "Source: 'target/out/"

    # Disable long line linter for auto-generated files
    - find: |
        set_option linter.unusedVariables false
      replace: |
        set_option linter.unusedVariables false
        set_option linter.style.longLine false
        set_option linter.style.setOption false
        set_option linter.style.whitespace false

    # Fix duplicate field name in ZeroablePrimitive: both Copy clauses get named markerCopyInst
    # https://github.com/AeneasVerif/aeneas/issues/1051
    - find: "(parentClauses := [\"markerCopyInst\", \"privateSealedInst\", \"markerCopyInst\"])"
      replace: "(parentClauses := [\"markerCopyInst\", \"privateSealedInst\", \"markerCopyNonZeroInnerInst\"])"
    # https://github.com/AeneasVerif/aeneas/issues/1051
    - regex: "(privateSealedInst : core\\.num\\.nonzero\\.private\\.Sealed Self\\n)  markerCopyInst : core\\.marker\\.Copy Self_NonZeroInner"
      replace: "$1  markerCopyNonZeroInnerInst : core.marker.Copy Self_NonZeroInner"

    # Sorry BytesBufBuf instance body: remaining/chunk/advance are fields of Buf,
    # so the self-referential struct literal causes termination errors.
    # https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/102
    - regex: "(def Shared0SliceU8\\.Insts\\.BytesBufBuf_implBuf[\\s\\S]*?):= \\{[\\s\\S]*?\\n\\}"
      replace: "$1:= sorry"

    # Sorry all prost Message instance bodies: method names are fields of prost.message.Message,
    # so the self-referential struct literal causes termination errors.
    # https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/102
    - regex: "(def\\s+[\\w.]+\\.Insts\\.ProstMessageMessage[\\s\\S]*?):= \\{[\\s\\S]*?\\n\\}"
      replace: "$1:= sorry"

    # Sorry VecDeque IntoIter Iterator instance body: next/step_by/enumerate are fields of Iterator.
    # https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/102
    - regex: "(def\\s+alloc\\.collections\\.vec_deque\\.into_iter\\.IntoIter\\.Insts\\.CoreIterTraitsIteratorIterator[\\s\\S]*?):= \\{[\\s\\S]*?\\n\\}"
      replace: "$1:= sorry"

    # Sorry VecDeque FromIterator instance body: from_iter is a field of FromIterator.
    # https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/102
    - regex: "(def\\s+alloc\\.collections\\.vec_deque\\.VecDequeTGlobal\\.Insts\\.CoreIterTraitsCollectFromIterator[\\s\\S]*?):= \\{[\\s\\S]*?\\n\\}"
      replace: "$1:= sorry"

    # Sorry Result FromIterator instance body: from_iter is a field of FromIterator.
    # https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/102
    - regex: "(def\\s+core\\.result\\.Result\\.Insts\\.CoreIterTraitsCollectFromIteratorResult[\\s\\S]*?):= \\{[\\s\\S]*?\\n\\}"
      replace: "$1:= sorry"

    # Fix local variable `chain` shadowing module namespace `chain.Chain` in `send`.
    # https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/101
    - find: "let chain ←\n                    match val2.key with"
      replace: "let chain' ←\n                    match val2.key with"
    - find: "let chain ←\n                match val2.key with"
      replace: "let chain' ←\n                match val2.key with"
    - find: "chain.Chain.send_key chain i3"
      replace: "chain.Chain.send_key chain' i3"
    - find: "chain.Chain.send_key chain i1"
      replace: "chain.Chain.send_key chain' i1"

    # Fix local variable `chain` shadowing module namespace `chain.Chain` in `recv`.
    # https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/101
    - find: "let chain ←\n                            match val5.key with"
      replace: "let chain' ←\n                            match val5.key with"
    - find: "let chain ←\n                    match val3.key with"
      replace: "let chain' ←\n                    match val3.key with"
    - find: "chain.Chain.into_pb chain\n"
      replace: "chain.Chain.into_pb chain'\n"
    - find: "chain.Chain.recv_key chain msg_key_epoch index"
      replace: "chain.Chain.recv_key chain' msg_key_epoch index"

    # Fix local variable `v1` shadowing module namespace `v1.chunked.states` in `recv`.
    # https://github.com/Beneficial-AI-Foundation/SparsePostQuantumRatchet-verify/issues/101
    - find: "let v1 := read_discriminant v\n      let i ← lift (IScalar.hcast .U8 v1)"
      replace: "let v1' := read_discriminant v\n      let i ← lift (IScalar.hcast .U8 v1')"

    # Strip map field from Iterator instances (Aeneas generates it but Lean backend doesn't have it)
    # https://github.com/AeneasVerif/aeneas/issues/1043
    - regex: "\\n  map := fun \\{B : Type\\} \\{F : Type\\}[\\s\\S]*?(?=\\n  enumerate)"
      replace: ""

    # Replace collect field with take := sorry in Iterator instances
    # https://github.com/AeneasVerif/aeneas/issues/1043
    - regex: "\\n  collect := fun \\{B : Type\\}[\\s\\S]*?(?=\\n\\})"
      replace: "\n  take := sorry"

    # Sorry loop bodies where Aeneas generates () instead of the correct typed value
    # https://github.com/AeneasVerif/aeneas/issues/1044
    - regex: "(def (?:encoding\\.gf\\.parallel_mult_loop\\.body|encoding\\.polynomial\\.lagrange_polys_for_complete_points_loop0\\.body|encoding\\.polynomial\\.PolyEncoder\\.from_pb_loop1\\.body|encoding\\.polynomial\\.PolyEncoder\\.encode_bytes_base_loop\\.body)\\n[\\s\\S]*?):= do[\\s\\S]*?(?=\\n/-- )"
      replace: "$1:= sorry"

    # Sorry merge closure FnOnce call_once assignments (Aeneas types them wrong)
    # https://github.com/AeneasVerif/aeneas/issues/1046
    - regex: "call_once :=\\n    proto\\.pq_ratchet\\.\\S+\\.merge\\.closure\\S*\\.Insts\\.CoreOpsFunctionFnOnceTupleTupleTuple\\.call_once\\n    bytesbufbuf_implBufInst\\n}"
      replace: "call_once := sorry\n}"

    # Sorry merge function bodies (broken Result.map with mistyped closures)
    # https://github.com/AeneasVerif/aeneas/issues/1046
    - regex: "(def proto\\.pq_ratchet\\.(?:pq_ratchet_state\\.Inner|v1_msg\\.InnerMsg|v1_state\\.InnerState)\\.merge\\n[\\s\\S]*?):= do[\\s\\S]*?(?=\\n/-- )"
      replace: "$1:= sorry"

    # Fix ok_or none type inference
    # https://github.com/AeneasVerif/aeneas/issues/1018
    - find: "core.option.Option.ok_or none Error.StateDecode"
      replace: "core.option.Option.ok_or (none : Option _) Error.StateDecode"
    - regex: "(\\| core\\.ops\\.control_flow\\.ControlFlow\\.Continue) val2 (=>\\n\\s+let \\S+ ← encoding\\.polynomial\\.PolyDecoder\\.from_pb val2)"
      replace: "$1 (val2 : proto.pq_ratchet.PolynomialDecoder) $2"
    - regex: "(\\| core\\.ops\\.control_flow\\.ControlFlow\\.Continue) val4 (=>\\n\\s+let \\S+ ← encoding\\.polynomial\\.PolyDecoder\\.from_pb val4)"
      replace: "$1 (val4 : proto.pq_ratchet.PolynomialDecoder) $2"

    # The goal is to later replace the mul_assign axiom with a definition. This is currently blocked
    # because it depends on unaccelerated::mul, which is generated after related functions due to function ordering.
    # Reordering the Rust functions should resolve the issue.
    - find: |
        /-- [spqr::encoding::gf::{core::ops::arith::Mul<spqr::encoding::gf::GF16, spqr::encoding::gf::GF16> for spqr::encoding::gf::GF16}::mul]:
      replace: |
        /-- [spqr::encoding::gf::{core::ops::arith::MulAssign<&0 (spqr::encoding::gf::GF16)> for spqr::encoding::gf::GF16}::mul_assign]:
            Source: 'src/encoding/gf.rs', lines 490:4-503:5 -/
        def encoding.gf.GF16.Insts.CoreOpsArithMulAssignShared0GF16.mul_assign
          (self : encoding.gf.GF16) (other : encoding.gf.GF16) :
          Result encoding.gf.GF16
          := do
          let i ← encoding.gf.unaccelerated.mul self.value other.value
          ok { value := i }

        /-- [spqr::encoding::gf::{core::ops::arith::Mul<spqr::encoding::gf::GF16, spqr::encoding::gf::GF16> for spqr::encoding::gf::GF16}::mul]:
