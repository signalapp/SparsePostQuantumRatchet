name = "Spqr"
version = "0.1.0"
defaultTargets = ["Spqr", "SrcTranslated"]

[leanOptions]
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxRecDepth = 10000

[[require]]
name = "aeneas"
git = "https://github.com/AeneasVerif/aeneas.git"
subDir = "backends/lean"
rev = "bcfa1ca15"

# secure-messaging model (n1: IncrementalStructure + mlkemIncremental +
# incrementalCorrectExp_failure_le_mlkem768). Local-path (dev mode) → detached worktree at n1
# tip 5c749f1. secure-messaging is release-native, so no edits there.
[[require]]
name = "SecureMessaging"
path = "../secure-messaging-incr-mlkem"

# e2e PoC: unify the whole tree on Lean/mathlib v4.30.0 RELEASE (secure-messaging + VCV-io's
# native version). The aeneas rev is UNCHANGED (bcfa1ca15) — no re-extraction; SrcTranslated is
# byte-identical, and the rc2-era aeneas backend compiles fine under release (validated).
# mathlib pinned here and placed LAST so it wins the require ordering.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

[[lean_lib]]
name = "SrcTranslated"

[[lean_lib]]
name = "Spqr"

[[lean_lib]]
name = "Utils"

[[lean_exe]]
name = "status"
root = "Utils.Status"
# Test suites: the project-linter `#guard_msgs` tests (`Tests.LinterTest.*`) and the
# property-based Plausible tests (`Tests.PlausibleTests.*`).  Deliberately NOT in
# `defaultTargets`, so neither the dummy `@[step]` linter theorems nor the randomized
[[lean_lib]]
name = "Tests"

# Stage-0 go/no-go probe: one file importing BOTH the extraction (SrcTranslated) and the model
# (SecureMessaging.KEM.MLKEM.Incremental) — proves both co-elaborate on one unified toolchain.
# Throwaway artifact; remove once the real PoC specs land under Spqr/Specs/IncrementalMlkem768/.
[[lean_lib]]
name = "Probe"
